services:
  web:
    build: .
    image: django-base:latest
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && uvicorn django_base.asgi:application --host 0.0.0.0 --port 8000"
    working_dir: /app/django_base
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/django_base
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - DJANGO_LANGUAGE_CODE=${DJANGO_LANGUAGE_CODE}
      - DJANGO_TIME_ZONE=${DJANGO_TIME_ZONE}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    expose:
      - "8000"
    depends_on:
      - db
    volumes:
      - static_data:/app/django_base/static
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  celery:
    build: .
    image: django-base:latest
    command: celery -A django_base worker --loglevel=info
    volumes:
      - ./django_base:/app/django_base
    working_dir: /app/django_base
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/django_base/static:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - web
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  flower:
    image: mher/flower:2.0.1
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH}
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
      celery:
        condition: service_started
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/django_base/static:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ""
    command: >
      sh -c "sleep 10 && certbot certonly --webroot --webroot-path=/var/www/certbot
      --email l24122018@yandex.ru --agree-tos --no-eff-email
      -d midas-hand.ru -d www.midas-hand.ru"
    depends_on:
      - nginx
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

volumes:
  static_data: