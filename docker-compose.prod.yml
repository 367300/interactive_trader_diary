services:
  db:
    image: postgres:17.5
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  rabbitmq:
    image: rabbitmq:4.1.1-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  redis:
    image: redis:8
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  web:
    build: .
    image: django-base:latest
    working_dir: /app/django_base
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && uvicorn django_base.asgi:application --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/django_base
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - DJANGO_LANGUAGE_CODE=${DJANGO_LANGUAGE_CODE}
      - DJANGO_TIME_ZONE=${DJANGO_TIME_ZONE}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    expose:
      - "8000"
    volumes:
      - static_data:/app/django_base/static
      - ./uploads:/app/uploads:ro
    depends_on:
      - db
      - rabbitmq
      - redis
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  celery:
    build: .
    image: django-base:latest
    working_dir: /app/django_base
    command: celery -A django_base worker --loglevel=info
    volumes:
      - ./uploads:/app/uploads:ro
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: trader-diary-frontend:latest
    expose:
      - "80"
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/django_base/static:ro
      - ./uploads:/app/uploads:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - web
      - frontend
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

  flower:
    image: mher/flower:2.0.1
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH}
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
      celery:
        condition: service_started
    deploy:
      restart_policy:
        condition: unless-stopped
        delay: 30s
        window: 600s

volumes:
  postgres_data:
  static_data:
