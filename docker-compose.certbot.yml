# Одноразовый запуск для получения или обновления SSL-сертификатов.
# Перед запуском prod-стек с nginx должен быть поднят и доступен на порту 80.
#
# Первичное получение сертификата:
#   docker compose -f docker-compose.prod.yml -f docker-compose.certbot.yml run --rm certbot
#
# Обновление сертификата (раз в несколько месяцев):
#   docker compose -f docker-compose.prod.yml -f docker-compose.certbot.yml run --rm certbot renew
#   docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

services:
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    env_file:
      - .env
    entrypoint: ""
    command: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email
      -d ${CERTBOT_DOMAIN} -d www.${CERTBOT_DOMAIN}"
